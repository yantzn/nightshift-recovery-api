version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: nurse-sleep-app
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    environment:
      TZ: Asia/Tokyo
      NODE_ENV: development
      AWS_REGION: ap-northeast-1
      AWS_DEFAULT_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE_NAME: nurse-sleep-dev
      LOG_LEVEL: debug
      JWT_SECRET: local-dev-secret
    depends_on:
      - dynamodb-local

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: nurse-sleep-dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: nurse-sleep-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      - dynamodb-local

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: nurse-sleep-swagger-ui
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /app/openapi.yaml
      BASE_URL: /
    volumes:
      - ../swagger/openapi.yaml:/app/openapi.yaml:ro

volumes:
  dynamodb_data:
